name: CI
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: File Instagram
        run: wget https://raw.githubusercontent.com/raiyan088/Emulator/refs/heads/main/instagram.apk

      - name: Download Script
        run: wget https://raw.githubusercontent.com/raiyan088/script/refs/heads/main/runner.js

      - name: Install package
        run: npm install ws
        
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            adb wait-for-device
            adb devices
            adb install instagram.apk
            adb shell getprop ro.build.version.release
            adb shell getprop ro.product.cpu.abi
            adb shell wm size
            
            while true; do echo "Running"; sleep 30; done
