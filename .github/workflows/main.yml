name: CI
on: [push, workflow_dispatch]

env:
  ALL_PROXY: socks5://51.20.74.249:60002
  HTTP_PROXY: ""
  HTTPS_PROXY: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - run: curl https://ifconfig.me
      - run: |
          echo $ALL_PROXY
          curl https://ifconfig.me
          
      - name: Set SSH Password
        run: |
          echo "runner:123456" | sudo chpasswd
          
      - name: Install ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update
          sudo apt install -y ngrok
  
      - name: Set Ngrok Authtoken
        run: ngrok config add-authtoken 2YMpPG6ws3Y1x5unwwSlUNVs3Wu_67JPAFd2MmxAo7cBVK7Lq
  
      - name: Start SSH Tunnel
        run: |
          nohup ngrok tcp 22 > /tmp/ngrok.log 2>&1 &
      
      - name: Show Tunnel
        run: |
          sleep 8
          curl --noproxy "*" -s http://127.0.0.1:4040/api/tunnels > tunnels.json
          cat tunnels.json
          grep -oE 'tcp://[^"]+' tunnels.json || true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            adb wait-for-device
            adb devices
            adb shell getprop ro.build.version.release
            adb shell getprop ro.product.cpu.abi
            adb shell wm size
            
            while true; do echo "Running"; sleep 30; done

      - name: List all files recursively
        run: ls
