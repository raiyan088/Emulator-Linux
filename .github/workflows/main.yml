name: CI
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Install dependencies
      # =========================
      - name: Install base tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl libc6 libstdc++6

      # =========================
      # Install Android SDK (FIXED)
      # =========================
      - name: Install Android SDK + cmdline-tools
        run: |
          sudo mkdir -p $ANDROID_SDK_ROOT

          cd /tmp

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip

          unzip cmdline.zip

          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          sudo mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH

          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin

          yes | sdkmanager --licenses

      # =========================
      # Install SDK packages
      # =========================
      - name: Install SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-30" \
            "build-tools;36.0.0" \
            "system-images;android-30;google_apis;x86_64"

      # =========================
      # Create AVD
      # =========================
      - name: Create AVD (Fixed Safe)
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator
      
          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-30;google_apis;x86_64" \
            -d pixel_5
      
          # Wait for AVD folder to exist
          sleep 5
      
          # Ensure directory exists before writing config
          if [ ! -d "$HOME/.android/avd/test.avd" ]; then
            echo "AVD creation failed"
            ls -R $HOME/.android
            exit 1
          fi
      
          # Safe config edit
          echo "hw.cpu.ncore=2" >> $HOME/.android/avd/test.avd/config.ini
          echo "hw.ramSize=2048" >> $HOME/.android/avd/test.avd/config.ini
          
      # =========================
      # Start Emulator
      # =========================
      - name: Start Emulator
        run: |
          nohup emulator @test \
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            > emulator.log 2>&1 &

      # =========================
      # Wait for Boot
      # =========================
      - name: Wait for Emulator Boot
        run: |
          adb wait-for-device

          until adb shell getprop sys.boot_completed | grep -q "1"; do
            sleep 5
          done

          adb shell input keyevent 82

          adb devices
          adb shell getprop ro.build.version.release
          adb shell getprop ro.product.cpu.abi
          adb shell wm size

      # =========================
      # Check status
      # =========================
      - name: Emulator Running Check
        run: |
          ps -ef | grep emulator || true
          adb devices
